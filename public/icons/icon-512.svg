<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
	<defs>
		<radialGradient id="bg" cx="50%" cy="50%" r="60%">
			<stop offset="0%"   stop-color="#060a18"/>
			<stop offset="100%" stop-color="#000005"/>
		</radialGradient>
		<linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"   stop-color="#4488ff"/>
			<stop offset="100%" stop-color="#1a3a8a"/>
		</linearGradient>
	</defs>
	<rect width="512" height="512" fill="url(#bg)"/>

	<!-- Stars -->
	<g fill="#ffffff" opacity="0.55">
		<circle cx="58"  cy="90"  r="2.4"/>
		<circle cx="430" cy="70"  r="1.8"/>
		<circle cx="470" cy="250" r="2.8"/>
		<circle cx="30"  cy="350" r="1.5"/>
		<circle cx="400" cy="450" r="2.1"/>
		<circle cx="100" cy="440" r="1.3"/>
		<circle cx="220" cy="60"  r="1.8"/>
		<circle cx="320" cy="20"  r="1.1"/>
	</g>

	<!-- Stargate ring -->
	<g transform="translate(256 256)">
		<circle r="180" fill="none" stroke="#4488ff" stroke-width="5"  opacity="0.35"/>
		<circle r="164" fill="none" stroke="url(#ring)" stroke-width="26"/>
		<circle r="142" fill="#020818"/>

		<g fill="#88bbff">
			<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" opacity="1"/>
			<g opacity="0.55">
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(40)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(80)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(120)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(160)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(200)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(240)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(280)"/>
				<path d="M -18 -160 L 0 -180 L 18 -160 L 13 -146 L -13 -146 Z" transform="rotate(320)"/>
			</g>
		</g>

		<!-- SGU title text inside the ring -->
		<text x="0" y="8" text-anchor="middle" font-family="'Courier New',monospace"
			font-weight="bold" font-size="56" fill="#88bbff" letter-spacing="8">SGU</text>
	</g>
</svg>
