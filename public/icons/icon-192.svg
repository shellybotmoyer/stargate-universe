<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
	<!-- Background — deep space with a slight gradient -->
	<defs>
		<radialGradient id="bg" cx="50%" cy="50%" r="60%">
			<stop offset="0%"   stop-color="#060a18"/>
			<stop offset="100%" stop-color="#000005"/>
		</radialGradient>
		<linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%"   stop-color="#4488ff"/>
			<stop offset="100%" stop-color="#1a3a8a"/>
		</linearGradient>
	</defs>
	<rect width="192" height="192" fill="url(#bg)"/>

	<!-- Stars -->
	<g fill="#ffffff" opacity="0.55">
		<circle cx="22"  cy="34"  r="0.9"/>
		<circle cx="160" cy="28"  r="0.7"/>
		<circle cx="175" cy="95"  r="1.1"/>
		<circle cx="12"  cy="130" r="0.6"/>
		<circle cx="150" cy="170" r="0.8"/>
		<circle cx="40"  cy="165" r="0.5"/>
	</g>

	<!-- Stargate ring -->
	<g transform="translate(96 96)">
		<!-- Outer ring glow -->
		<circle r="68" fill="none" stroke="#4488ff" stroke-width="2" opacity="0.35"/>
		<!-- Main ring -->
		<circle r="62" fill="none" stroke="url(#ring)" stroke-width="10"/>
		<!-- Inner dark horizon -->
		<circle r="54" fill="#020818"/>

		<!-- Chevrons (9 around the ring, standard Stargate layout) -->
		<g fill="#88bbff">
			<!-- top chevron lit -->
			<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" opacity="1"/>
			<!-- 8 other chevrons at 40deg intervals, rotated around center -->
			<g opacity="0.55">
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(40)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(80)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(120)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(160)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(200)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(240)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(280)"/>
				<path d="M -7 -60 L 0 -68 L 7 -60 L 5 -55 L -5 -55 Z" transform="rotate(320)"/>
			</g>
		</g>
	</g>
</svg>
