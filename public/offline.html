<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Offline — Stargate Universe</title>
  <meta name="description" content="No network connection. Reconnect to play Stargate Universe." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="canonical" href="https://stargate-universe.coredumped.org/offline.html" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      color: #4488ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      border: 1px solid rgba(68,136,255,0.25);
      border-radius: 12px;
      padding: 3rem 2rem;
      max-width: 400px;
      background: rgba(68,136,255,0.04);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #4488ff;
    }
    p {
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #4488ff;
      text-decoration: none;
      border: 1px solid #4488ff;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: rgba(68,136,255,0.1); }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon pulse">🌌</div>
    <h1>Signal Lost</h1>
    <p>The Ancient comms relay is down.<br />Reconnect to continue your journey aboard Destiny.</p>
    <a href="/">&#9650; Re-establish link</a>
  </div>
</body>
</html>
