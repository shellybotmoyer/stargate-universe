    <!-- Twitter Card -->

    <meta name="twitter:title" content="Stargate Universe — Survive Aboard the Ancient Vessel Destiny" />
    <meta name="twitter:description" content="Survive aboard the Ancient vessel Destiny — a browser-native sci-fi RPG. Explore uncharted galaxies, manage resources, and make story-defining choices." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Stargate Universe",

    <!-- Favicon (reuse the 192 SVG until real rasterized assets land). -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />

    <!-- Service Worker update notification styles -->
    <style>
      #sw-update {
        position: fixed; bottom: 0; left: 0; right: 0;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
        z-index: 9999;
      }
      #sw-update.active { transform: translateY(0); }
      #sw-update > div {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border-top: 1px solid rgba(68,136,255,0.4);
        color: #c8d6e5;
        padding: 0.75rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        font-size: 0.9rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      #sw-update button {
        background: #4488ff;
        color: #fff;
        border: none;
        padding: 0.4rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: background 0.2s;
      }
      #sw-update button:hover { background: #3377ee; }
      #sw-update .close {
        background: none;
        color: #666;
        padding: 0.25rem;
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      #sw-update .close:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Service Worker update notification -->
    <div id="sw-update">
      <div>
        <span>A new version is available.</span>
        <button id="sw-update-btn">Update</button>
        <button class="close" id="sw-update-close" aria-label="Dismiss">&times;</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        let swRegistration = null;
        let swUpdateBanner = document.getElementById('sw-update');
        let swUpdateBtn = document.getElementById('sw-update-btn');
        let swUpdateClose = document.getElementById('sw-update-close');

        async function registerSW() {
          try {
            swRegistration = await navigator.serviceWorker.register('/sw.js');
            swRegistration.addEventListener('updatefound', () => {
              const newWorker = swRegistration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  swUpdateBanner.classList.add('active');
                }
              });
            });
          } catch (e) {
            console.warn('SW registration failed:', e);
          }
        }

        swUpdateBtn.addEventListener('click', () => {
          swUpdateBanner.classList.remove('active');
          if (swRegistration && swRegistration.waiting) {
            swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            window.location.reload();
          }
        });

        swUpdateClose.addEventListener('click', () => {
          swUpdateBanner.classList.remove('active');
        });

        registerSW();
      }
    </script>
  </body>
</html>
